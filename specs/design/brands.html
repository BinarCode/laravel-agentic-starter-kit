<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Restock — Brands</title>
<link rel="stylesheet" href="css/app.css"/>
<script src="js/topnav.js"></script>
<script src="js/cart.js"></script>
</head>
<body>
<div id="nav-mount"></div>

<div class="page">
  <div class="page-hd">
    <div>
      <div class="page-title">Brands</div>
      <div class="page-desc">8 brands · 147 active EANs</div>
    </div>
  </div>


  <div class="tbl-wrap">
    <div class="tbl-toolbar">
      <input class="tbl-search" placeholder="Search brand…" oninput="apply(this.value)"/>
      <div style="display:flex;gap:6px">
        <div class="chip active" onclick="bf('all',this)">All</div>
        <div class="chip" onclick="bf('risk',this)">At risk</div>
        <div class="chip" onclick="bf('safe',this)">Safe</div>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="data-tbl">
        <thead><tr><th></th><th>Brand</th><th>Supplier</th><th>EANs</th><th>Reorder in</th><th>Revenue risk</th><th>Products in stock</th><th>Lead time</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const brands=[
  {name:'Medicube', eans:9, days:6,  risk:21400, lt:'21d', urg:'critical', inStock:44, inStockN:4},
  {name:'Anua',     eans:6, days:8,  risk:13200, lt:'18d', urg:'critical', inStock:33, inStockN:2},
  {name:'Round Lab',eans:5, days:14, risk:7000,  lt:'24d', urg:'warning',  inStock:60, inStockN:3},
  {name:'Isntree',  eans:12,days:19, risk:4100,  lt:'21d', urg:'warning',  inStock:58, inStockN:7},
  {name:'COSRX',    eans:3, days:40, risk:0,     lt:'20d', urg:'safe',     inStock:100, inStockN:3},
  {name:'Some By Mi',eans:8,days:35, risk:0,     lt:'22d', urg:'safe',     inStock:88, inStockN:7},
  {name:'Klairs',   eans:7, days:52, risk:0,     lt:'19d', urg:'safe',     inStock:86, inStockN:6},
  {name:"Dr. Jart+",eans:4, days:61, risk:0,     lt:'25d', urg:'safe',     inStock:100, inStockN:4},
];
const mR=Math.max(...brands.map(b=>b.risk)); let filt='all';

function donut(pct, n, total) {
  const r=14, circ=2*Math.PI*r, fill=circ*(pct/100);
  const col = pct<50 ? 'var(--destructive)' : pct<80 ? '#f59e0b' : 'var(--success)';
  const txt = pct<50 ? 'var(--destructive-fg)' : pct<80 ? '#b45309' : 'var(--success-fg)';
  return '<div style="display:flex;align-items:center;gap:10px">'
    + '<svg width="34" height="34" viewBox="0 0 36 36" style="flex-shrink:0;transform:rotate(-90deg)">'
    + '<circle cx="18" cy="18" r="'+r+'" fill="none" stroke="var(--zinc-200)" stroke-width="3.5"/>'
    + '<circle cx="18" cy="18" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="3.5"'
    + ' stroke-dasharray="'+fill.toFixed(1)+' '+circ.toFixed(1)+'" stroke-linecap="round"/>'
    + '</svg>'
    + '<div>'
    + '<div style="font-size:14px;font-weight:700;color:'+txt+'">'+n+' of '+total+'</div>'
    + '<div style="font-size:11px;color:var(--muted-foreground);margin-top:1px">products</div>'
    + '</div>'
    + '</div>';
}

function render(items){
  const tb=document.getElementById('tbody'); tb.innerHTML='';
  items.forEach(b=>{
    const bc=b.urg==='critical'?'badge-red':b.urg==='warning'?'badge-amber':'badge-green';
    const rc=b.risk>0?(b.urg==='critical'?'destructive':'warning'):'zero';
    const rp=b.risk>0?Math.round(b.risk/mR*100):0;
    const tr=document.createElement('tr');
    tr.onclick=()=>location='brand-detail.html';
    tr.innerHTML=`
      <td></td>
      <td>${b.urg!=='safe'?`<span class="urg-dot ${b.urg}"></span>`:''}<strong style="font-size:14px;font-weight:600;letter-spacing:-0.02em">${b.name}</strong></td>
      <td style="font-size:14px;color:var(--muted-foreground)">${(()=>{const sid=(typeof BRAND_SUPPLIER!=='undefined'?BRAND_SUPPLIER[b.name]:null);const s=sid&&(typeof SUPPLIERS!=='undefined'?SUPPLIERS.find(x=>x.id===sid):null);return s?s.name:'—';})()}</td>
      <td style="font-size:14px;color:var(--muted-foreground)">${b.eans}</td>
      <td><span class="badge ${bc}">${b.days} days</span></td>
      <td><div class="risk-cell">
        <span class="risk-val ${rc}">${b.risk>0?'€'+b.risk.toLocaleString():'—'}</span>
        ${b.risk>0?`<div class="risk-track"><div class="risk-fill ${rc}" style="width:${rp}%"></div></div>`:''}
      </div></td>
      <td>${donut(b.inStock, b.inStockN, b.eans)}</td>
      <td style="font-size:14px;color:var(--muted-foreground)">${b.lt}</td>
      <td><a href="brand-detail.html" class="btn btn-ghost btn-sm">View →</a></td>`;
    tb.appendChild(tr);
  });
}
function bf(f,el){filt=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');apply();}
function apply(q=''){let r=brands;if(filt==='risk')r=r.filter(b=>b.urg!=='safe');else if(filt==='safe')r=r.filter(b=>b.urg==='safe');if(q)r=r.filter(b=>b.name.toLowerCase().includes(q.toLowerCase()));render(r);}
apply();
</script>
</body>
</html>
